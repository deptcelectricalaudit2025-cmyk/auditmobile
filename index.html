<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VDC Audit v8.5 | Trần Công Đẹp</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #0056b3; --success: #28a745; --danger: #dc3545; --light: #f8f9fa;
        }
        body { font-family: -apple-system, sans-serif; background: #e9ecef; margin: 0; padding-bottom: 30px; }
        .app-header { background: var(--primary); color: white; padding: 15px; text-align: center; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .screen { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .big-btn { width: 100%; padding: 16px; margin-bottom: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; }
        
        /* Checklist Styling */
        .check-item { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 6px solid #ccc; transition: 0.3s; }
        .check-item.ok { border-left-color: var(--success); }
        .check-item.ng { border-left-color: var(--danger); }
        
        .ref-tag { color: var(--primary); font-size: 12px; font-weight: bold; text-decoration: underline; cursor: pointer; }
        .status-box { display: flex; gap: 10px; margin: 15px 0; }
        .btn-status { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-weight: bold; background: #f8f9fa; }
        .btn-status.active-ok { background: var(--success); color: white; border-color: var(--success); }
        .btn-status.active-ng { background: var(--danger); color: white; border-color: var(--danger); }
        
        textarea { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ddd; border-radius: 8px; resize: none; min-height: 80px; font-family: inherit; }
        .photo-upload { margin-top: 10px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #666; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-header" id="mainHeader" style="display:none;">
        <button onclick="handleBack()" style="background:none; border:none; color:white; font-size:20px;">⬅️</button>
        <h1 id="headerTitle" style="margin:0; font-size:18px;">VDC Audit</h1>
        <button onclick="goHome()" style="background:none; border:none; color:white; font-size:20px;">🏠</button>
    </div>

    <div id="screen-welcome" class="screen active">
        <div class="card" style="text-align:center; margin-top:50px;">
            <h2>🛡️ Hệ Thống Kiểm Tra v8.5</h2>
            <p>Chào anh <strong>Trần Công Đẹp</strong></p>
            <input type="text" id="projInput" style="width:100%; padding:15px; box-sizing:border-box; border-radius:8px; border:2px solid #ddd;" placeholder="NHẬP TÊN DỰ ÁN...">
            <button class="big-btn" style="background:var(--primary); margin-top:15px;" onclick="connectCloud()">KẾT NỐI CLOUD (ASIA)</button>
        </div>
    </div>

    <div id="screen-dashboard" class="screen">
        <div class="card" style="border-top:5px solid var(--primary)">
            Dự án: <strong id="curProj" style="color:var(--primary)"></strong>
        </div>
        <button class="big-btn" style="background:#004494" onclick="openOffice()">📂 1. KIỂM TRA HỒ SƠ</button>
        <button class="big-btn" style="background:#218838" onclick="switchScreen('screen-field-select')">🏗️ 2. KIỂM TRA HIỆN TRƯỜNG</button>
        <button class="big-btn" style="background:#5a6268" onclick="exportData()">📥 XUẤT BÁO CÁO (CSV)</button>
    </div>

    <div id="screen-field-select" class="screen">
        <button class="big-btn" style="background:#28a745" onclick="openUnits('SUBSTATION', 'TRẠM BIẾN ÁP')">⚡ TRẠM BIẾN ÁP</button>
        <button class="big-btn" style="background:#28a745" onclick="openUnits('MSB', 'PHÒNG ĐIỆN')">🔌 PHÒNG ĐIỆN</button>
        <button class="big-btn" style="background:#28a745" onclick="openUnits('HAZARD', 'KHO HÓA CHẤT')">❄️ KHO HÓA CHẤT/LẠNH</button>
    </div>

    <div id="screen-unit-list" class="screen">
        <button class="big-btn" style="background:var(--success)" onclick="addUnit()">+ THÊM ĐỐI TƯỢNG MỚI</button>
        <div id="unit-container"></div>
    </div>

    <div id="screen-checklist" class="screen">
        <div id="check-info" style="font-weight:bold; text-align:center; margin-bottom:15px;"></div>
        <div id="checklist-items"></div>
    </div>

<script>
    // --- CẤU HÌNH FIREBASE ASIA ---
    const firebaseConfig = {
        apiKey: "AIzaSyAOCGFGjyzjKlQNQK5TvWD-5wxyhW93h88",
        authDomain: "auditmobile-6fae9.firebaseapp.com",
        projectId: "auditmobile-6fae9",
        databaseURL: "https://auditmobile-6fae9-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "auditmobile-6fae9.firebasestorage.app",
        appId: "1:929776192269:web:ca0d8a3a277f4ccfb83e44"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- DỮ LIỆU CÂU HỎI KIỂM TRA ---
    const MASTER_DATA = {
        'OFFICE': [
            { id: 'O1', txt: 'Hồ sơ thiết kế & hoàn công', ref: 'Luật ĐL Đ55' },
            { id: 'O2', txt: 'Thẻ an toàn điện nhân viên', ref: 'TT 05/2021' }
        ],
        'SUBSTATION': [
            { id: 'S1', txt: 'Biển báo nguy hiểm, cấm lại gần', ref: 'QCVN 25' },
            { id: 'S2', txt: 'Độ rọi chiếu sáng trạm (>300 Lux)', ref: 'QCVN 22/2016' },
            { id: 'S3', txt: 'Sào cách điện, găng tay, ủng', ref: 'Thông tư 05' }
        ],
        'MSB': [
            { id: 'M1', txt: 'Sơ đồ nguyên lý tại tủ điện', ref: 'Luật ĐL' },
            { id: 'M2', txt: 'Thảm cách điện tại vị trí thao tác', ref: 'QCVN 01' }
        ],
        'HAZARD': [
            { id: 'H1', txt: 'Đèn chiếu sáng chống cháy nổ (Ex)', ref: 'QCVN 05A' },
            { id: 'H2', txt: 'Tiếp địa vỏ kim loại thiết bị', ref: 'QPTBE-Đ186' }
        ]
    };

    let appState = { businessName: "", officeResults: {}, fieldUnits: [] };
    let curType = ''; let curUnitIdx = -1;

    function connectCloud() {
        const name = document.getElementById('projInput').value.trim().toUpperCase();
        if(!name) return alert("Nhập tên dự án!");
        appState.businessName = name;
        db.ref('audits/' + name).on('value', snap => {
            const data = snap.val();
            if(data) {
                appState.officeResults = data.officeResults || {};
                appState.fieldUnits = data.fieldUnits || [];
                if(document.getElementById('screen-checklist').classList.contains('active')) renderChecklist();
            }
            document.getElementById('curProj').innerText = name;
            switchScreen('screen-dashboard');
        });
    }

    function sync() {
        db.ref('audits/' + appState.businessName).set(appState);
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('mainHeader').style.display = (id === 'screen-welcome') ? 'none' : 'flex';
        window.scrollTo(0,0);
    }

    function openUnits(type, label) {
        curType = type;
        document.getElementById('headerTitle').innerText = label;
        renderUnitList();
        switchScreen('screen-unit-list');
    }

    function renderUnitList() {
        const cont = document.getElementById('unit-container');
        cont.innerHTML = '';
        const list = appState.fieldUnits.filter(u => u.type === curType);
        list.forEach(u => {
            const realIdx = appState.fieldUnits.indexOf(u);
            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `<div style="display:flex; justify-content:space-between">
                <strong onclick="openChecklist(${realIdx})">📍 ${u.name}</strong>
                <span style="color:red" onclick="deleteUnit(${realIdx})">Xóa</span>
            </div>`;
            cont.appendChild(d);
        });
    }

    function addUnit() {
        const n = prompt("Tên đối tượng (VD: Trạm số 1):");
        if(n) { appState.fieldUnits.push({ type: curType, name: n, results: {} }); sync(); renderUnitList(); }
    }

    function openOffice() {
        curType = 'OFFICE';
        document.getElementById('check-info').innerText = "KIỂM TRA HỒ SƠ";
        renderChecklist();
        switchScreen('screen-checklist');
    }

    function openChecklist(idx) {
        curUnitIdx = idx;
        curType = appState.fieldUnits[idx].type;
        document.getElementById('check-info').innerText = appState.fieldUnits[idx].name;
        renderChecklist();
        switchScreen('screen-checklist');
    }

    function renderChecklist() {
        const cont = document.getElementById('checklist-items');
        cont.innerHTML = '';
        const questions = MASTER_DATA[curType] || [];
        const res = (curType === 'OFFICE') ? appState.officeResults : appState.fieldUnits[curUnitIdx].results;

        questions.forEach(q => {
            const val = res[q.id] || { status: '', note: '' };
            const d = document.createElement('div');
            d.className = `check-item ${val.status.toLowerCase()}`;
            d.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <strong>${q.txt}</strong>
                    <span class="ref-tag">${q.ref}</span>
                </div>
                <div class="status-box">
                    <button class="btn-status ${val.status==='OK'?'active-ok':''}" onclick="updateRes('${q.id}','OK')">ĐẠT</button>
                    <button class="btn-status ${val.status==='NG'?'active-ng':''}" onclick="updateRes('${q.id}','NG')">KHÔNG ĐẠT</button>
                </div>
                <textarea onchange="updateNote('${q.id}', this.value)" placeholder="Ghi chú vi phạm hoặc kiến nghị...">${val.note || ''}</textarea>
                <div class="photo-upload">
                    <span>📷 Chụp ảnh bằng chứng:</span>
                    <input type="file" accept="image/*" capture="camera" style="font-size:10px">
                </div>
            `;
            cont.appendChild(d);
        });
    }

    function updateRes(id, stat) {
        let target = (curType === 'OFFICE') ? appState.officeResults : appState.fieldUnits[curUnitIdx].results;
        if(!target[id]) target[id] = {note:''};
        target[id].status = (target[id].status === stat) ? '' : stat;
        sync();
    }

    function updateNote(id, txt) {
        let target = (curType === 'OFFICE') ? appState.officeResults : appState.fieldUnits[curUnitIdx].results;
        if(!target[id]) target[id] = {status:''};
        target[id].note = txt;
        sync();
    }

    function handleBack() {
        const cur = document.querySelector('.screen.active').id;
        if(cur === 'screen-checklist') (curType === 'OFFICE' ? switchScreen('screen-dashboard') : switchScreen('screen-unit-list'));
        else if(cur === 'screen-unit-list') switchScreen('screen-field-select');
        else switchScreen('screen-dashboard');
    }

    function goHome() { switchScreen('screen-dashboard'); }
    function deleteUnit(i) { if(confirm("Xóa đối tượng này?")) { appState.fieldUnits.splice(i,1); sync(); renderUnitList(); } }

    function exportData() {
        let csv = "\uFEFFLoai,Doi tuong,Noi dung,Ket qua,Ghi chu\n";
        // Office
        MASTER_DATA.OFFICE.forEach(q => {
            const r = appState.officeResults[q.id] || {};
            csv += `Ho so,Van phong,"${q.txt}",${r.status||''},"${r.note||''}"\n`;
        });
        // Field
        appState.fieldUnits.forEach(u => {
            (MASTER_DATA[u.type] || []).forEach(q => {
                const r = u.results[q.id] || {};
                csv += `${u.type},${u.name},"${q.txt}",${r.status||''},"${r.note||''}"\n`;
            });
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `BaoCao_${appState.businessName}.csv`;
        link.click();
    }
</script>
</body>
</html>
