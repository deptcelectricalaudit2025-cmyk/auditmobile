<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App An Toàn Điện v7.2 (Audit Mobile)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #0056b3; --secondary: #6c757d; --success: #28a745;
            --danger: #dc3545; --warning: #ffc107; --light: #f8f9fa;
            --dark: #343a40; --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #e9ecef; margin: 0; padding-bottom: 20px;
        }

        /* Header */
        .app-header {
            background-color: var(--primary); color: white; padding: 15px;
            text-align: center; box-shadow: var(--shadow); position: sticky; top: 0;
            z-index: 1000; display: flex; justify-content: space-between; align-items: center;
        }
        .app-header h1 { margin: 0; font-size: 18px; flex-grow: 1; }
        .btn-icon { background: none; border: none; font-size: 20px; cursor: pointer; color: white; padding: 0 10px; }

        /* Screens */
        .screen { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .screen.active { display: block; }

        /* Components */
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .big-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 18px; margin-bottom: 15px; border: none; border-radius: 10px;
            font-size: 16px; font-weight: bold; color: white; cursor: pointer; box-shadow: var(--shadow);
        }
        .btn-office { background: linear-gradient(135deg, #0056b3, #004494); }
        .btn-field { background: linear-gradient(135deg, #28a745, #218838); }
        .btn-export { background: #217346; }

        /* Checklist Items */
        .check-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #ddd; }
        .check-card.ng { border-left-color: var(--danger); }
        .check-card.ok { border-left-color: var(--success); }

        .code-tag { 
            background: #e2e6ea; padding: 3px 8px; border-radius: 4px; 
            font-size: 12px; font-weight: bold; cursor: help; color: var(--primary);
            text-decoration: underline;
        }
        
        .status-row { display: flex; gap: 10px; margin: 15px 0; }
        .btn-status { flex: 1; padding: 12px; border: 1px solid #dee2e6; background: #f8f9fa; border-radius: 5px; font-weight: 600; cursor: pointer; }
        .btn-status.ok.active { background: var(--success); color: white; border-color: var(--success); }
        .btn-status.ng.active { background: var(--danger); color: white; border-color: var(--danger); }

        textarea { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ced4da; border-radius: 5px; min-height: 60px; font-family: inherit; }

        /* Modal for Reference Details */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 15% auto; padding: 25px; border-radius: 12px; width: 85%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        #toast { visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; border-radius: 5px; padding: 16px; position: fixed; left: 50%; transform: translateX(-50%); bottom: 30px; z-index: 3000;}
        #toast.show { visibility: visible; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast">Đã đồng bộ dữ liệu</div>
    <div id="refModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modalTitle" style="margin-top:0; color:var(--primary)"></h3>
            <p id="modalBody" style="line-height: 1.6; color: #333;"></p>
            <button class="big-btn btn-office" style="margin-bottom:0" onclick="closeModal()">Đã hiểu</button>
        </div>
    </div>

    <div class="app-header" id="mainHeader" style="display:none;">
        <button class="btn-icon" onclick="handleBack()">⬅️</button>
        <h1 id="headerTitle">An Toàn Điện v7.2</h1>
        <button class="btn-icon" onclick="goHome()">🏠</button>
    </div>

    <div id="screen-welcome" class="screen active">
        <div class="card" style="text-align:center; margin-top:50px;">
            <div style="font-size: 50px;">🔋</div>
            <h2>Chào bạn, Trần Công Đẹp</h2>
            <p>Nhập tên dự án để đồng bộ Mobile & Laptop</p>
            <input type="text" id="businessNameInput" style="width:100%; padding:15px; box-sizing:border-box; border-radius:8px; border:1px solid #ccc; font-size:16px;" placeholder="VD: Heineken_TienGiang_2026">
            <button class="big-btn btn-office" style="margin-top:15px;" onclick="confirmStartSession()">KẾT NỐI CLOUD</button>
        </div>
    </div>

    <div id="screen-dashboard" class="screen">
        <div class="card" style="text-align:center; border-top: 5px solid var(--primary);">
            🏢 Dự án: <strong id="displayBusinessName" style="color:var(--primary)"></strong>
            <div style="color:var(--success); font-size:12px; margin-top:5px;">● Đang đồng bộ trực tuyến</div>
        </div>
        <button class="big-btn btn-office" onclick="goToOfficeCheck()">📂 KIỂM TRA HỒ SƠ</button>
        <button class="big-btn btn-field" onclick="goToFieldSelection()">🏗️ KIỂM TRA HIỆN TRƯỜNG</button>
        <div style="margin-top:30px; border-top:1px dashed #ccc; padding-top:20px;">
             <button class="big-btn btn-export" onclick="exportToExcel()">📥 XUẤT BÁO CÁO (CSV)</button>
        </div>
    </div>

    <div id="screen-field-select" class="screen">
        <h3 style="text-align:center;">Chọn hạng mục kiểm tra</h3>
        <button class="big-btn btn-field" onclick="goToUnitList('SUBSTATION')">⚡ Trạm Biến Áp</button>
        <button class="big-btn btn-field" onclick="goToUnitList('MSB')">🔌 Phòng Điện / Tủ Chính</button>
        <button class="big-btn btn-field" onclick="goToUnitList('HAZARD')">❄️ Kho Hóa Chất / Lạnh</button>
        <button class="big-btn btn-field" onclick="goToUnitList('LAB')">🧪 Phòng Lab / SX</button>
    </div>

    <div id="screen-unit-list" class="screen">
        <button class="big-btn btn-office" style="background:#28a745" onclick="createNewUnit()">+ Thêm Đối Tượng Mới</button>
        <div id="unit-list-container" style="margin-top:20px;"></div>
    </div>

    <div id="screen-checklist" class="screen">
        <div id="checklist-header-info" style="background:white; padding:10px; border-radius:8px; font-weight:bold; text-align:center; margin-bottom:15px; box-shadow: var(--shadow);"></div>
        <div id="checklist-container"></div>
    </div>

<script>
    // --- FIREBASE CONFIG (NEW) ---
    const firebaseConfig = {
        apiKey: "AIzaSyAOCGFGjyzjKlQNQK5TvWD-5wxyhW93h88",
        authDomain: "auditmobile-6fae9.firebaseapp.com",
        projectId: "auditmobile-6fae9",
        storageBucket: "auditmobile-6fae9.firebasestorage.app",
        messagingSenderId: "929776192269",
        appId: "1:929776192269:web:ca0d8a3a277f4ccfb83e44",
        measurementId: "G-Q97D0ZYDFW"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- REFERENCE DATA (Tra cứu quy định) ---
    const REF_DETAILS = {
        "Luật ĐL Đ55": "Yêu cầu hồ sơ thiết kế kỹ thuật, bản vẽ hoàn công hệ thống điện phải được phê duyệt và lưu trữ đầy đủ tại đơn vị vận hành.",
        "TT 05/2021": "Thẻ an toàn điện phải được cấp cho người lao động sau khi huấn luyện sát hạch đạt yêu cầu. Thẻ có giá trị trên toàn quốc.",
        "QCVN 05A:2020": "Thiết bị điện trong kho hóa chất phải là loại chống cháy nổ (Ex). Công tắc, ổ cắm phải đặt bên ngoài khu vực chứa hóa chất.",
        "QCVN 22/2016": "Độ rọi chiếu sáng tại khu vực trạm điện tối thiểu phải đạt 300 Lux. Đối với vị trí thao tác tủ điện, yêu cầu đạt 500 Lux.",
        "QPTBE-Đ186": "Mọi phần kim loại của thiết bị điện bình thường không mang điện nhưng có thể mang điện khi cách điện bị hỏng phải được nối đất.",
        "NĐ 44-Đ14": "Người sử dụng lao động phải theo dõi cấp phát và hướng dẫn người lao động sử dụng đúng các phương tiện bảo vệ cá nhân (PPE)."
    };

    const CHECKLIST_DB = [
        { id: "DOC-01", area: "OFFICE", text: "Hồ sơ thiết kế & Bản vẽ hoàn công", ref: "Luật ĐL Đ55" },
        { id: "DOC-05", area: "OFFICE", text: "Danh sách & Chữ ký cấp phát PPE", ref: "NĐ 44-Đ14" },
        { id: "DOC-06", area: "OFFICE", text: "Thẻ an toàn điện còn hiệu lực", ref: "TT 05/2021" },
        { id: "SUB-01", area: "SUBSTATION", text: "Biển báo 'Cấm lại gần' / 'Điện áp cao'", ref: "QCVN 25" },
        { id: "MSB-01", area: "MSB", text: "Độ rọi chiếu sáng trạm (500 Lux)", ref: "QCVN 22/2016" },
        { id: "HAZ-01", area: "HAZARD", text: "Thiết bị điện chống cháy nổ (Ex)", ref: "QCVN 05A:2020" },
        { id: "LAB-01", area: "LAB", text: "Tiếp địa vỏ kim loại thiết bị", ref: "QPTBE-Đ186" }
    ];

    let appState = { businessName: "", officeResults: {}, fieldUnits: [] };
    let currentAreaType = '';
    let currentUnitIndex = -1;

    // --- FIREBASE SYNC LOGIC ---
    function confirmStartSession() {
        const name = document.getElementById('businessNameInput').value.trim();
        if(!name) return alert("Vui lòng nhập tên dự án!");
        appState.businessName = name;
        
        // Theo dõi thay đổi từ Firebase
        db.ref('audits/' + name).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                appState.officeResults = data.officeResults || {};
                appState.fieldUnits = data.fieldUnits || [];
                if(document.getElementById('screen-checklist').classList.contains('active')) refreshChecklistUI();
            }
            showDashboard();
            showToast("Đã kết nối Cloud");
        });
    }

    function syncToCloud() {
        if(!appState.businessName) return;
        db.ref('audits/' + appState.businessName).set({
            officeResults: appState.officeResults,
            fieldUnits: appState.fieldUnits
        });
    }

    // --- NAVIGATION ---
    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('mainHeader').style.display = (id === 'screen-welcome') ? 'none' : 'flex';
        window.scrollTo(0,0);
    }

    function showDashboard() {
        document.getElementById('displayBusinessName').innerText = appState.businessName;
        switchScreen('screen-dashboard');
    }

    function handleBack() {
        const cur = document.querySelector('.screen.active').id;
        if(cur === 'screen-checklist') (currentAreaType==='OFFICE') ? switchScreen('screen-dashboard') : switchScreen('screen-unit-list');
        else if(cur === 'screen-unit-list') switchScreen('screen-field-select');
        else switchScreen('screen-dashboard');
    }

    function goHome() { switchScreen('screen-dashboard'); }

    // --- FIELD WORK ---
    function goToFieldSelection() { switchScreen('screen-field-select'); }

    function goToUnitList(area) {
        currentAreaType = area;
        renderUnitList();
        switchScreen('screen-unit-list');
    }

    function renderUnitList() {
        const container = document.getElementById('unit-list-container');
        container.innerHTML = '';
        const units = appState.fieldUnits.filter(u => u.type === currentAreaType);
        
        if(units.length === 0) container.innerHTML = '<p style="text-align:center; color:#888;">Chưa có đối tượng nào. Vui lòng thêm mới.</p>';

        units.forEach((u) => {
            const realIdx = appState.fieldUnits.indexOf(u);
            const div = document.createElement('div');
            div.className = 'card';
            div.style.padding = '15px';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong style="font-size:18px; color:var(--primary); cursor:pointer;" onclick="openUnit(${realIdx})">📍 ${u.name}</strong>
                    <button onclick="deleteUnit(${realIdx})" style="color:red; border:none; background:none; font-weight:bold;">Xóa</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function createNewUnit() {
        const name = prompt("Tên khu vực/thiết bị (VD: Kho lạnh số 1):");
        if(name) {
            appState.fieldUnits.push({ type: currentAreaType, name: name, results: {} });
            syncToCloud(); renderUnitList();
        }
    }

    function openUnit(idx) {
        currentUnitIndex = idx;
        document.getElementById('checklist-header-info').innerText = "KIỂM TRA: " + appState.fieldUnits[idx].name;
        renderChecklist(appState.fieldUnits[idx].results, currentAreaType);
        switchScreen('screen-checklist');
    }

    // --- OFFICE WORK ---
    function goToOfficeCheck() {
        currentAreaType = 'OFFICE';
        document.getElementById('checklist-header-info').innerText = "HỒ SƠ VĂN PHÒNG";
        renderChecklist(appState.officeResults, 'OFFICE');
        switchScreen('screen-checklist');
    }

    // --- CHECKLIST CORE ---
    function renderChecklist(resultsObj, area) {
        const container = document.getElementById('checklist-container');
        container.innerHTML = '';
        const items = CHECKLIST_DB.filter(i => i.area === area);
        
        items.forEach(item => {
            const res = resultsObj[item.id] || { status: '', note: '' };
            const div = document.createElement('div');
            div.className = `check-card ${res.status.toLowerCase()}`;
            div.innerHTML = `
                <div style="margin-bottom:10px;">
                    <span class="code-tag" onclick="showRef('${item.ref}')">📖 ${item.ref}</span>
                    <div style="margin-top:10px; font-weight:600; font-size:16px;">${item.text}</div>
                </div>
                <div class="status-row">
                    <button class="btn-status ok ${res.status==='OK'?'active':''}" onclick="updateStatus('${item.id}','OK')">ĐẠT</button>
                    <button class="btn-status ng ${res.status==='NG'?'active':''}" onclick="updateStatus('${item.id}','NG')">KHÔNG ĐẠT</button>
                </div>
                <textarea onchange="updateNote('${item.id}', this.value)" placeholder="Nhập ghi chú vi phạm hoặc kiến nghị...">${res.note}</textarea>
            `;
            container.appendChild(div);
        });
    }

    function updateStatus(id, status) {
        let target = (currentAreaType === 'OFFICE') ? appState.officeResults : appState.fieldUnits[currentUnitIndex].results;
        if(!target[id]) target[id] = {note:''};
        target[id].status = (target[id].status === status) ? '' : status;
        syncToCloud();
    }

    function updateNote(id, val) {
        let target = (currentAreaType === 'OFFICE') ? appState.officeResults : appState.fieldUnits[currentUnitIndex].results;
        if(!target[id]) target[id] = {status:''};
        target[id].note = val; 
        syncToCloud();
    }

    function refreshChecklistUI() {
        const res = (currentAreaType === 'OFFICE') ? appState.officeResults : appState.fieldUnits[currentUnitIndex].results;
        renderChecklist(res, currentAreaType);
    }

    // --- MODAL & TOAST ---
    function showRef(refCode) {
        const detail = REF_DETAILS[refCode] || "Chi tiết quy định hiện chưa được cập nhật cho mục tham chiếu này.";
        document.getElementById('modalTitle').innerText = refCode;
        document.getElementById('modalBody').innerText = detail;
        document.getElementById('refModal').style.display = 'block';
    }
    function closeModal() { document.getElementById('refModal').style.display = 'none'; }
    function showToast(msg) {
        const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    function deleteUnit(idx) {
        if(confirm("Bạn có chắc chắn muốn xóa đối tượng này?")) {
            appState.fieldUnits.splice(idx, 1);
            syncToCloud(); renderUnitList();
        }
    }

    // --- EXPORT ---
    function exportToExcel() {
        const BOM = "\uFEFF";
        let csv = BOM + `BAO CAO KIEM TRA AN TOAN DIEN: ${appState.businessName}\n`;
        csv += `Khu vuc,Doi tuong,Ma,Noi dung,Ket qua,Ghi chu,Tham chieu\n`;
        
        // Office
        CHECKLIST_DB.filter(i=>i.area==='OFFICE').forEach(i=>{
            const r = appState.officeResults[i.id] || {};
            csv += `Ho so,Van phong,${i.id},${i.text},${r.status||''},"${(r.note||'').replace(/"/g,'""')}",${i.ref}\n`;
        });
        // Field
        appState.fieldUnits.forEach(u=>{
            CHECKLIST_DB.filter(i=>i.area===u.type).forEach(i=>{
                const r = u.results[i.id] || {};
                csv += `${u.type},${u.name},${i.id},${i.text},${r.status||''},"${(r.note||'').replace(/"/g,'""')}",${i.ref}\n`;
            });
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `BaoCao_AnToanDien_${appState.businessName}.csv`;
        link.click();
    }
</script>
</body>
</html>
